<!DOCTYPE html>
<html>
<head>
    <title>MotionGuard | Evidence Frames</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 40px 20px;
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .frame-card {
            background: #1e293b;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,255,100,0.2);
            transition: 0.3s;
            cursor: pointer;
        }

        .frame-card:hover {
            transform: scale(1.03);
        }

        img {
            width: 100%;
            border-radius: 8px;
        }

        .btn {
            display: inline-block;
            padding: 12px 20px;
            margin: 15px 10px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #1d4ed8;
        }

        /* MODAL */
        #zoomModal {
            display: none;
            position: fixed;
            z-index: 1000;
            padding-top: 60px;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.9);
        }

        #zoomImg {
            margin: auto;
            display: block;
            max-width: 80%;
            max-height: 80%;
        }

        .close {
            position: absolute;
            top: 20px;
            right: 45px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Evidence Frames</h2>

    <div class="grid">
        {% if images %}
            {% for img in images %}
                <div class="frame-card">
                    <img src="{{ url_for('static', filename='results/frames/' + img) }}"
                         onclick="openModal(this.src)">
                </div>
            {% endfor %}
        {% else %}
            <p>No evidence frames available.</p>
        {% endif %}
    </div>

    <br>

    <a href="/" class="btn">Upload Another Video</a>
    <a href="javascript:history.back()" class="btn">Back to Result</a>

</div>

<!-- MODAL -->
<div id="zoomModal">
    <span class="close" onclick="closeModal()">&times;</span>
    <img id="zoomImg">
</div>

<script>
function openModal(src) {
    document.getElementById("zoomModal").style.display = "block";
    document.getElementById("zoomImg").src = src;
}

function closeModal() {
    document.getElementById("zoomModal").style.display = "none";
}
</script>

</body>
</html>
